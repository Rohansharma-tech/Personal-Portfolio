# render.yaml — Render Infrastructure-as-Code
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO DEPLOY:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint
#   3. Connect this repo — Render reads this file automatically
#   4. After deploy, copy the service URL (e.g. https://portfolio-backend.onrender.com)
#   5. Set that URL as VITE_API_URL in Netlify dashboard
#
# IMPORTANT: After first deploy, set these env vars in Render dashboard
# (marked sync:false below — they are intentionally left blank here for security):
#   - CLOUDINARY_CLOUD_NAME
#   - CLOUDINARY_API_KEY
#   - CLOUDINARY_API_SECRET
#   - CORS_ALLOWED_ORIGINS   (set to your Netlify URL, e.g. https://your-app.netlify.app)
#   - ADMIN_EMAIL
#   - ADMIN_PASSWORD

services:
  - type: web
    name: portfolio-backend
    runtime: python
    region: oregon          # change to: frankfurt, singapore, ohio — pick closest to you
    plan: free              # free tier: sleeps after 15 min inactivity (cold start ~30s)
    rootDir: backend

    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput

    startCommand: >-
      python manage.py migrate &&
      python manage.py setup_portfolio &&
      gunicorn portfolio_backend.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120

    healthCheckPath: /health/

    envVars:
      # Auto-generated secure key — never committed to git
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      # Injected automatically from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

      # Set these manually in Render dashboard after first deploy
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Set to your Netlify URL, e.g.: https://your-app.netlify.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # Set to your Render service hostname, e.g.: portfolio-backend.onrender.com
      - key: ALLOWED_HOSTS
        sync: false

      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      - key: APP_VERSION
        value: "1.0.0"

databases:
  - name: portfolio-db
    plan: free              # free tier: 1 GB storage, 97 hours/month
    databaseName: portfolio
    user: portfolio_user
    region: oregon          # must match the service region above
