name: CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new push comes in
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Django Backend Tests
  # ─────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: 🐍 Backend Tests (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          SECRET_KEY: "ci-test-secret-key-only-for-github-actions-not-production"
          DEBUG: "True"
          DATABASE_URL: ""               # falls back to SQLite
          CLOUDINARY_CLOUD_NAME: "test"
          CLOUDINARY_API_KEY: "000000000000000"
          CLOUDINARY_API_SECRET: "test_secret"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          CORS_ALLOWED_ORIGINS: "http://localhost:5173"
          SENTRY_DSN: ""                 # intentionally empty — no error reporting in CI
        run: python manage.py test api --verbosity=2

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: React Frontend — Lint + Build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: ⚡ Frontend Build (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build (Vite production)
        run: npm run build
        env:
          VITE_API_URL: "https://portfolio-backend.onrender.com"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deployment Status Summary (runs after both pass)
  # ─────────────────────────────────────────────────────────────────────────────
  deployment-ready:
    name: 🚀 Deployment Ready
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: All checks passed
        run: |
          echo "✅ Backend tests passed"
          echo "✅ Frontend build passed"
          echo ""
          echo "🚀 Deployments triggered automatically:"
          echo "   • Frontend → Netlify (via Git integration)"
          echo "   • Backend  → Render  (via Git integration)"
          echo ""
          echo "🔗 Frontend: https://your-app.netlify.app"
          echo "🔗 Backend:  https://portfolio-backend.onrender.com"
